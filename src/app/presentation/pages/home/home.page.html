<ng-template #homeToolbar let-large="large">
  <ion-toolbar>
    <ion-title [size]="large ? 'large' : undefined">Mis tareas</ion-title>
    <ion-buttons slot="end">
      <ion-button
        (click)="toggleCloudSync()"
        [attr.aria-label]="store.cloudSyncEnabled() ? 'Desactivar sincronización en la nube' : 'Activar sincronización en la nube'"
        [color]="store.cloudSyncEnabled() ? 'primary' : 'medium'"
        fill="clear"
      >
        <ion-icon
          slot="icon-only"
          [name]="store.cloudSyncEnabled() ? 'cloud' : 'cloud-offline'"
        ></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ng-template>

<ion-header [translucent]="true">
  <ng-container *ngTemplateOutlet="homeToolbar" />
</ion-header>

<ion-content [fullscreen]="true">
  @if (isIos) {
    <ion-header collapse="condense">
      <ng-container *ngTemplateOutlet="homeToolbar; context: { large: true }" />
    </ion-header>
  }

  <app-filter-bar
    [categories]="store.categories()"
    [activeFilter]="store.filter()"
    [pendingCount]="store.pendingCount()"
    (filterChange)="onFilterChange($event)"
  />

  @if (store.loading()) {
    <div class="centered">
      <ion-spinner name="crescent"></ion-spinner>
    </div>
  } @else if (store.visibleTasks().length === 0) {
    <div class="centered empty">
      <ion-text color="medium">
        <p>No hay tareas</p>
      </ion-text>
    </div>
  } @else {
    <ion-list>
      @for (task of store.visibleTasks(); track task.id) {
        <app-task-item
          [task]="task"
          [categories]="store.categories()"
          (toggled)="onTaskToggled($event)"
          (deleted)="onTaskDeleted($event)"
          (categoryChanged)="onCategoryChanged($event.task, $event.categoryId)"
        />
      }
    </ion-list>
  }

  <ion-fab slot="fixed" vertical="bottom" horizontal="end" class="fab-safe-area">
    <ion-fab-button (click)="openModal()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>

<ion-modal [isOpen]="showModal" (didDismiss)="closeModal()">
  <ng-template>
    <app-add-task-modal
      [categories]="store.categories()"
      (dismissed)="closeModal()"
      (saved)="onTaskSaved($event)"
    />
  </ng-template>
</ion-modal>
